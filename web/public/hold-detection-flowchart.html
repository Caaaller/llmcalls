<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hold & Human Detection Flows</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 32px 24px; }
  h1 { text-align: center; font-size: 26px; margin-bottom: 6px; color: #e6edf3; }
  .subtitle { text-align: center; color: #8b949e; margin-bottom: 28px; font-size: 13px; }

  .category-row { display: flex; align-items: center; gap: 12px; margin: 20px auto 8px; max-width: 960px; }
  .category-row:first-of-type { margin-top: 0; }
  .category-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; white-space: nowrap; padding: 4px 10px; border-radius: 4px; }
  .category-label.human { color: #d2a8ff; background: #1f1a2e; }
  .category-label.nothuman { color: #79c0ff; background: #0d2233; }
  .category-label.holdtransition { color: #ffa657; background: #2a1f0d; }
  .category-label.confirmation { color: #3fb950; background: #1a3a1a; }
  .category-label.postconfirm { color: #f0883e; background: #2a1f0d; }
  .category-label.clarify { color: #d29922; background: #2a1f0d; }
  .category-line { flex: 1; height: 1px; background: #21262d; }

  .tab-group { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; max-width: 960px; margin: 0 auto 6px; }
  .tab { padding: 6px 12px; border-radius: 5px; border: 1px solid #30363d; background: #161b22; color: #8b949e; cursor: pointer; font-size: 12px; transition: all 0.15s; user-select: none; }
  .tab:hover { border-color: #484f58; color: #c9d1d9; }
  .tab.active { background: #1f6feb; border-color: #1f6feb; color: #fff; font-weight: 600; }

  .scenario { display: none; max-width: 580px; margin: 28px auto 0; }
  .scenario.active { display: block; }
  .scenario-header { text-align: center; margin-bottom: 20px; }
  .scenario-header h2 { font-size: 17px; color: #e6edf3; margin-bottom: 5px; }
  .scenario-header p { font-size: 12px; color: #8b949e; line-height: 1.5; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 5px; font-weight: 600; }
  .badge.cat { background: #2a1f0d; color: #d29922; border: 1px solid #d2992233; margin-right: 3px; }

  .box { padding: 12px 16px; border-radius: 7px; border: 1px solid #30363d; background: #161b22; text-align: center; font-size: 12px; line-height: 1.6; }
  .box.speech { background: #1c2333; border-color: #388bfd33; }
  .box.ai { background: #1f1a2e; border-color: #8b5cf633; }
  .box.backend { background: #1a2a1a; border-color: #3fb95033; }
  .box.result-good { background: #1a3a1a; border-color: #3fb95055; }
  .box.result-bad { background: #3d1f1f; border-color: #f8514955; }
  .box.state { background: #2a1f0d; border-color: #d2992233; }
  .box.timer { background: #0d2233; border-color: #58a6ff33; }
  .box.note { background: #161b22; border-color: #30363d; border-style: dashed; font-size: 11px; color: #8b949e; }
  .box.rule { background: #1a1a2e; border-color: #6e76e433; font-size: 11px; }
  .box.system { background: #0d2233; border-color: #58a6ff33; }
  .icon { margin-right: 5px; }
  .arrow { text-align: center; padding: 5px 0; color: #484f58; font-size: 16px; }
  .arrow .label { font-size: 10px; display: block; margin-top: -2px; }
  .arrow .label.good { color: #3fb950; }
  .arrow .label.bad { color: #f85149; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: #484f58; margin: 12px 0 6px; text-align: center; font-weight: 600; }
  .highlight { color: #ffa657; font-weight: 600; }
  .hl-red { color: #f85149; font-weight: 600; }
  .hl-green { color: #3fb950; font-weight: 600; }
  .hl-blue { color: #79c0ff; font-weight: 600; }
  .hl-purple { color: #d2a8ff; font-weight: 600; }
  .hl-orange { color: #ffa657; font-weight: 600; }
  code { background: #1c2333; padding: 1px 5px; border-radius: 3px; font-size: 11px; color: #79c0ff; }
  .divider { border: none; border-top: 1px dashed #21262d; margin: 16px 0; }
</style>
</head>
<body>

<h1>Hold & Human Detection Flows</h1>
<p class="subtitle">Click any tab to see the expected flow. All test scenarios across 6 categories.</p>

<div id="app"></div>

<script>

          { t: 'system', label: 'We asked (2nd time)', text: '🔊 "I\'m sorry, are you a human or an automated message?"' },
          { t: 'note', text: 'No speech detected — silence' },
          { t: 'ai', text: 'No response to evaluate after second question' },
          { t: 'result-good', text: '<span class="hl-green">All confirmation state cleared</span><br>Back to normal — 30s timer handles hold' },
          { t: 'note', text: 'We gave two chances. If nobody responds, go back to waiting. Don\'t keep asking.' },
        ]
      },
    ]
  },
];

const app = document.getElementById('app');
let activeId = categories[0].scenarios[0].id;

function render() {
  let html = '';
  categories.forEach(cat => {
    html += `<div class="category-row"><span class="category-label ${cat.cls}">${cat.name}</span><span class="category-line"></span></div>`;
    html += '<div class="tab-group">';
    cat.scenarios.forEach(s => {
      html += `<div class="tab${s.id === activeId ? ' active' : ''}" data-id="${s.id}">${s.name}</div>`;
    });
    html += '</div>';
  });

  let active = null;
  categories.forEach(cat => cat.scenarios.forEach(s => { if (s.id === activeId) active = { ...s, catName: cat.name }; }));

  if (active) {
    html += '<div class="scenario active">';
    html += `<div class="scenario-header"><h2>${active.name}</h2><p>${active.desc}</p><span class="badge cat">${active.catName}</span></div>`;
    active.steps.forEach((step, i) => {
      if (step.t === 'divider') { html += '<hr class="divider">'; return; }
      if (step.label) html += `<div class="section-label">${step.label}</div>`;
      const icons = { speech:'🎙️', ai:'🤖', backend:'⚙️', state:'📋', 'result-good':'✅', 'result-bad':'💥', timer:'⏱️', note:'💡', rule:'📐', system:'🔊' };
      const noArrowTypes = new Set(['state','note','rule']);
      if (i > 0 && !noArrowTypes.has(step.t)) html += '<div class="arrow">↓</div>';
      html += `<div class="box ${step.t}"><span class="icon">${icons[step.t]||''}</span>${step.text}</div>`;
    });
    html += '</div>';
  }

  app.innerHTML = html;
  app.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => { activeId = tab.dataset.id; render(); });
  });
}
render();
</script>

</body>
</html>
